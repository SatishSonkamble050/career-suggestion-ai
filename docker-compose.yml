version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fastapi_backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend